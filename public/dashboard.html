<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KCTVM Ops Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .board-col { min-width: 260px; max-width: 260px; }
    .card-border-new                   { border-left: 4px solid #6366f1; }
    .card-border-scheduling            { border-left: 4px solid #8b5cf6; }
    .card-border-awaiting_time_confirm { border-left: 4px solid #0ea5e9; }
    .card-border-tech_search           { border-left: 4px solid #f59e0b; }
    .card-border-awaiting_tech_reply   { border-left: 4px solid #f97316; }
    .card-border-awaiting_payment      { border-left: 4px solid #10b981; }
    .card-border-confirmed             { border-left: 4px solid #22c55e; }
    .card-border-follow_up             { border-left: 4px solid #94a3b8; }
    .card-border-completed             { border-left: 4px solid #64748b; }
    .card-border-cancelled             { border-left: 4px solid #ef4444; }
    .bubble-user      { background: #f1f5f9; border-radius: 12px 12px 12px 2px; align-self: flex-start; }
    .bubble-assistant { background: #1e40af; color: #fff; border-radius: 12px 12px 2px 12px; align-self: flex-end; }
    .bubble-draft     { background: #4f46e5; color: #fff; border-radius: 12px 12px 2px 12px; align-self: flex-end; opacity: 0.85; }
    .panel-open   { transform: translateX(0); }
    .panel-closed { transform: translateX(100%); }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .pulse-dot { animation: pulse-dot 1.5s ease-in-out infinite; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 14px; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .toast.success { background: #15803d; }
    .action-btn { font-size: 13px; padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: opacity 0.2s; border: none; }
    .action-btn:hover:not(:disabled) { opacity: 0.8; }
    .action-btn:disabled { opacity: 0.5; cursor: default; }
    .ks-btn { cursor: pointer; display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); transition: background 0.2s; }
    .ks-btn:hover { background: rgba(255,255,255,0.08); }
    .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; margin-bottom: 6px; }
  </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

<!-- Header -->
<header class="bg-gray-900 text-white flex items-center justify-between px-6 py-3 shrink-0 shadow-lg z-10">
  <div class="flex items-center gap-3">
    <span class="font-bold text-lg tracking-tight">KCTVM Ops</span>
    <span class="text-gray-500 text-sm">Dashboard</span>
  </div>

  <!-- Kill switch toggle button -->
  <button id="ks-btn" onclick="toggleKillSwitch()" class="ks-btn" title="Click to toggle system on/off">
    <div id="ks-dot" class="w-2.5 h-2.5 rounded-full bg-gray-500"></div>
    <span id="ks-label" class="text-gray-400 text-sm">Checking...</span>
  </button>

  <div class="flex items-center gap-3">
    <div class="flex items-center gap-1.5">
      <div class="w-2 h-2 rounded-full bg-green-400 pulse-dot"></div>
      <span class="text-green-400 text-xs font-medium">live</span>
      <span id="next-refresh" class="text-gray-500 text-xs ml-1"></span>
    </div>
    <span id="last-updated" class="text-gray-500 text-xs"></span>
    <button onclick="refreshBoard()" class="bg-gray-700 hover:bg-gray-600 text-white text-sm px-3 py-1.5 rounded-md transition">&#8635; Refresh</button>
  </div>
</header>

<!-- System paused banner -->
<div id="ks-banner" class="hidden bg-red-600 text-white text-center text-sm py-2 font-medium shrink-0">
  &#9888; SYSTEM PAUSED &mdash; Automated flows are disabled. Manual actions only.
</div>

<!-- Board + Panel wrapper -->
<div class="flex-1 overflow-hidden flex relative">
  <div id="board" class="flex gap-4 p-4 overflow-x-auto flex-1 items-start"></div>

  <div id="detail-panel"
       class="absolute top-0 right-0 h-full bg-white border-l border-gray-200 shadow-2xl overflow-y-auto transition-transform duration-300 panel-closed"
       style="width:440px;">
    <div id="panel-content" class="p-5 min-h-full"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ── COLUMNS — chronological job lifecycle order ────────────────────────────
const COLUMNS = [
  { key: 'new',                   label: 'New (Leads)',           color: '#6366f1', hdr: '#eef2ff' },
  { key: 'scheduling',            label: 'Scheduling',            color: '#8b5cf6', hdr: '#f5f3ff' },
  { key: 'awaiting_time_confirm', label: 'Awaiting Time Confirm', color: '#0ea5e9', hdr: '#f0f9ff' },
  { key: 'tech_search',           label: 'Tech Search',           color: '#f59e0b', hdr: '#fffbeb' },
  { key: 'awaiting_tech_reply',   label: 'Awaiting Tech Reply',   color: '#f97316', hdr: '#fff7ed' },
  { key: 'awaiting_payment',      label: 'Awaiting Payment',      color: '#10b981', hdr: '#f0fdf4' },
  { key: 'confirmed',             label: 'Confirmed',             color: '#22c55e', hdr: '#f0fdf4' },
  { key: 'follow_up',             label: 'Follow Up',             color: '#94a3b8', hdr: '#f8fafc' },
  { key: 'completed',             label: 'Completed',             color: '#64748b', hdr: '#f8fafc' },
  { key: 'cancelled',             label: 'Cancelled / No Tech',   color: '#ef4444', hdr: '#fef2f2' },
];

const ALL_STATUSES = [
  'new','scheduling','awaiting_time_confirm','tech_search',
  'awaiting_tech_reply','awaiting_payment','confirmed','completed','cancelled',
];

// Merge scheduling_conflict → scheduling, no_tech_available → cancelled
function colKey(status) {
  if (status === 'scheduling_conflict') return 'scheduling';
  if (status === 'no_tech_available') return 'cancelled';
  return status;
}

let allJobs = [];
let allLeads = [];
let selectedJobId = null;

// ── AUTO-REFRESH STATE ──────────────────────────────────────────────────────
const BOARD_REFRESH_MS = 15000;
let nextRefreshAt = 0;

// ── UTILS ───────────────────────────────────────────────────────────────────
function timeAgo(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

function fmt(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('en-US', {
    timeZone: 'America/Chicago', month: 'short', day: 'numeric',
    hour: 'numeric', minute: '2-digit', hour12: true,
  });
}

function firstN(str) { return str ? str.split(' ')[0] : '?'; }

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, isSuccess, dur) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isSuccess ? ' success' : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove('show'); }, dur || 3000);
}
function showSuccess(msg) { showToast(msg, true, 2000); }

async function apiFetch(path, opts) {
  const r = await fetch(path, opts || {});
  if (!r.ok) {
    const err = await r.json().catch(function() { return {}; });
    throw new Error(err.error || r.statusText);
  }
  return r.json();
}

function countTvs(job) {
  let n = 0;
  for (let i = 1; i <= 10; i++) {
    const s = job['tv_' + i + '_size'];
    if (s && s !== 'null' && s !== 'undefined') n++;
  }
  return n || 1;
}

function spinnerSvg() {
  return '<svg class="spin w-4 h-4 text-indigo-400 shrink-0" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>';
}

// ── KILL SWITCH ──────────────────────────────────────────────────────────────
function applyKillSwitchState(enabled) {
  document.getElementById('ks-dot').className = 'w-2.5 h-2.5 rounded-full ' + (enabled ? 'bg-green-400' : 'bg-red-500');
  document.getElementById('ks-label').textContent = enabled ? 'System ON' : 'System PAUSED';
  document.getElementById('ks-label').className = (enabled ? 'text-green-400' : 'text-red-400') + ' text-sm';
  document.getElementById('ks-banner').classList.toggle('hidden', enabled);
}

async function checkKillSwitch() {
  try { applyKillSwitchState((await apiFetch('/api/system-status')).enabled); } catch (_) {}
}

async function toggleKillSwitch() {
  try {
    const data = await apiFetch('/api/system-status/toggle', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
    applyKillSwitchState(data.enabled);
    showToast(data.enabled ? 'System enabled' : 'System PAUSED', data.enabled);
  } catch (e) { showToast('Kill switch error: ' + e.message); }
}

// ── SMS THREAD POLLING (FIX 1) ───────────────────────────────────────────────
function fetchAndRenderThread(phone, showLoader) {
  const el = document.getElementById('sms-thread');
  if (!el || !phone) return Promise.resolve();
  if (showLoader) el.innerHTML = '<div class="text-gray-400 text-xs text-center py-3">Loading&hellip;</div>';
  return fetch('/api/conversations/' + encodeURIComponent(phone), { cache: 'no-store' })
    .then(function(r) { return r.ok ? r.json() : Promise.reject(r.statusText); })
    .then(function(msgs) {
      const newCount = msgs ? msgs.length : 0;
      if (newCount !== window.lastThreadMessageCount) {
        window.lastThreadMessageCount = newCount;
        renderSmsThread(msgs);
      }
    })
    .catch(function(err) { console.warn('[Thread] fetch error:', err); });
}

function startThreadPolling(phone) {
  if (window.threadPollInterval) {
    clearInterval(window.threadPollInterval);
    window.threadPollInterval = null;
  }
  window.openPanelPhone = phone;
  window.lastThreadMessageCount = -1;

  fetchAndRenderThread(phone, true);

  window.threadPollInterval = setInterval(function() {
    console.log('[ThreadPoll] Firing — phone:', window.openPanelPhone, 'interval ID:', window.threadPollInterval);
    if (!window.openPanelPhone) {
      clearInterval(window.threadPollInterval);
      window.threadPollInterval = null;
      return;
    }
    fetchAndRenderThread(window.openPanelPhone, false);
  }, 4000);

  console.log('[ThreadPoll] Started for', phone, '— interval ID:', window.threadPollInterval);
}

function stopThreadPolling() {
  if (window.threadPollInterval) {
    clearInterval(window.threadPollInterval);
    window.threadPollInterval = null;
  }
  window.openPanelPhone = null;
  console.log('[ThreadPoll] Stopped');
}

function renderSmsThread(msgs) {
  const el = document.getElementById('sms-thread');
  if (!el) return;
  if (!msgs || msgs.length === 0) {
    el.innerHTML = '<div class="text-gray-400 text-xs text-center py-3">No messages yet</div>';
    return;
  }
  const atBottom = el.scrollHeight - el.scrollTop <= el.clientHeight + 30;
  el.innerHTML = msgs.map(function(m) {
    const isUser = m.role === 'user';
    const ts = m.created_at
      ? new Date(m.created_at).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })
      : '';
    return '<div class="flex flex-col ' + (isUser ? 'items-start' : 'items-end') + '">' +
      '<div class="max-w-xs px-3 py-2 text-sm ' + (isUser ? 'bubble-user text-gray-800' : 'bubble-assistant') + '">' + escHtml(m.content || '') + '</div>' +
      '<span class="text-gray-400 text-xs mt-0.5 px-1">' + ts + '</span>' +
    '</div>';
  }).join('');
  if (atBottom) el.scrollTop = el.scrollHeight;
}

function appendOptimisticMessage(text) {
  const el = document.getElementById('sms-thread');
  if (!el) return;
  const ts = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  const bubble = document.createElement('div');
  bubble.className = 'flex flex-col items-end';
  bubble.innerHTML =
    '<div class="max-w-xs px-3 py-2 text-sm bubble-assistant opacity-70">' + escHtml(text) + '</div>' +
    '<span class="text-gray-400 text-xs mt-0.5 px-1">' + ts + ' (sending…)</span>';
  el.appendChild(bubble);
  el.scrollTop = el.scrollHeight;
  window.lastThreadMessageCount = (window.lastThreadMessageCount || 0) + 1;
}

// ── AUTO-REFRESH (FIX 3) ────────────────────────────────────────────────────
function startBoardAutoRefresh() {
  if (window.boardRefreshInterval) clearInterval(window.boardRefreshInterval);
  nextRefreshAt = Date.now() + BOARD_REFRESH_MS;
  window.boardRefreshInterval = setInterval(function() {
    refreshBoard();
    nextRefreshAt = Date.now() + BOARD_REFRESH_MS;
  }, BOARD_REFRESH_MS);
  setInterval(function() {
    const el = document.getElementById('next-refresh');
    if (el) el.textContent = 'next in ' + Math.max(0, Math.round((nextRefreshAt - Date.now()) / 1000)) + 's';
  }, 1000);
}

// ── BOARD ────────────────────────────────────────────────────────────────────
function renderBoard(jobs, leads) {
  const board = document.getElementById('board');
  const byCol = {};
  COLUMNS.forEach(function(c) { byCol[c.key] = []; });

  jobs.forEach(function(j) {
    const k = colKey(j.status);
    if (byCol[k]) byCol[k].push(j);
  });

  const activeLeads = (leads || []).filter(function(l) { return !l.dormant; });
  const dormantLeads = (leads || []).filter(function(l) { return l.dormant; });

  board.innerHTML = '';
  COLUMNS.forEach(function(col) {
    const colJobs = byCol[col.key] || [];
    let totalCount = colJobs.length;
    const div = document.createElement('div');
    div.className = 'board-col flex-none flex flex-col gap-2';

    let cardsHtml = colJobs.map(function(j) {
      const techName = j.confirmed_tech_name || j.current_tech_name || null;
      const tvs = j.num_tvs || countTvs(j);
      const price = j.total_price ? '$' + j.total_price : '';
      const ago = j.created_at ? timeAgo(j.created_at) : '';
      return '<div class="bg-white rounded-lg shadow-sm p-3 cursor-pointer hover:shadow-md transition card-border-' + colKey(j.status) + '" onclick="openPanel(\'' + j.id + '\')">' +
        '<div class="flex items-center justify-between mb-1">' +
          '<span class="font-semibold text-gray-800 text-sm">' + escHtml(firstN(j.customer_name)) + '</span>' +
          '<span class="text-gray-400 text-xs">' + ago + '</span>' +
        '</div>' +
        '<div class="text-gray-500 text-xs mb-1">' + escHtml(j.city || '') + '</div>' +
        '<div class="flex items-center gap-2 text-xs text-gray-600">' +
          '<span>' + tvs + ' TV' + (tvs !== 1 ? 's' : '') + '</span>' +
          (price ? '<span class="font-medium text-gray-700">' + price + '</span>' : '') +
          (techName ? '<span class="ml-auto text-indigo-500 truncate max-w-20">' + escHtml(firstN(techName)) + '</span>' : '') +
        '</div>' +
      '</div>';
    }).join('');

    function makeLeadCard(lead, idx) {
      const ago = lead.last_message_at ? timeAgo(lead.last_message_at) : '';
      const preview = lead.last_message ? lead.last_message.slice(0, 60) + (lead.last_message.length > 60 ? '…' : '') : '';
      const borderColor = lead.dormant ? '#94a3b8' : '#6366f1';
      return '<div class="bg-white rounded-lg shadow-sm p-3 cursor-pointer hover:shadow-md transition border-l-4" style="border-left-color:' + borderColor + '" onclick="openLeadPanel(' + idx + ')">' +
        '<div class="flex items-center justify-between mb-1">' +
          '<span class="font-semibold text-gray-600 text-sm font-mono">' + escHtml(lead.phone) + '</span>' +
          '<span class="text-gray-400 text-xs">' + ago + '</span>' +
        '</div>' +
        '<div class="text-gray-500 text-xs mb-1 truncate">' + escHtml(preview) + '</div>' +
        '<div class="flex items-center gap-2 text-xs text-gray-400">' +
          '<span class="bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded text-xs">' + (lead.dormant ? 'Follow-up' : 'Lead') + '</span>' +
          '<span>' + lead.message_count + ' msg' + (lead.message_count !== 1 ? 's' : '') + '</span>' +
        '</div>' +
      '</div>';
    }

    let leadCardsHtml = '';
    if (col.key === 'new' && activeLeads.length > 0) {
      totalCount += activeLeads.length;
      leadCardsHtml = activeLeads.map(function(l) { return makeLeadCard(l, allLeads.indexOf(l)); }).join('');
    }
    if (col.key === 'follow_up' && dormantLeads.length > 0) {
      totalCount += dormantLeads.length;
      leadCardsHtml = dormantLeads.map(function(l) { return makeLeadCard(l, allLeads.indexOf(l)); }).join('');
    }

    div.innerHTML =
      '<div class="rounded-lg px-3 py-2 flex items-center justify-between mb-1" style="background:' + col.hdr + ';border-top:3px solid ' + col.color + '">' +
        '<span class="font-semibold text-gray-700 text-sm">' + col.label + '</span>' +
        '<span class="text-xs font-bold px-2 py-0.5 rounded-full text-white" style="background:' + col.color + '">' + totalCount + '</span>' +
      '</div>' +
      '<div class="flex flex-col gap-2 overflow-y-auto pr-0.5" style="max-height:calc(100vh - 130px)">' +
        (cardsHtml + leadCardsHtml || '<div class="text-gray-400 text-xs text-center py-4">Empty</div>') +
      '</div>';

    board.appendChild(div);
  });
}

// ── DETAIL PANEL — JOB ───────────────────────────────────────────────────────
async function openPanel(jobId) {
  stopThreadPolling();
  const job = allJobs.find(function(j) { return j.id === jobId; });
  if (!job) return;
  selectedJobId = jobId;
  console.log('[Dashboard] openPanel job.city:', job.city);

  const panel = document.getElementById('detail-panel');
  panel.classList.remove('panel-closed');
  panel.classList.add('panel-open');

  document.getElementById('panel-content').innerHTML = renderPanelShell(job);
  loadTechsForPanel();
  loadAiSuggestion(job, job.customer_phone);
  if (job.customer_phone) startThreadPolling(job.customer_phone);
}

// ── DETAIL PANEL — LEAD ──────────────────────────────────────────────────────
async function openLeadPanel(idx) {
  stopThreadPolling();
  const lead = allLeads[idx];
  if (!lead) return;
  selectedJobId = null;

  const panel = document.getElementById('detail-panel');
  panel.classList.remove('panel-closed');
  panel.classList.add('panel-open');

  document.getElementById('panel-content').innerHTML = renderLeadPanelShell(lead);
  loadAiSuggestion(null, lead.phone);
  startThreadPolling(lead.phone);
}

function closePanel() {
  stopThreadPolling();
  document.getElementById('detail-panel').classList.add('panel-closed');
  document.getElementById('detail-panel').classList.remove('panel-open');
  selectedJobId = null;
}

function statusBadge(status) {
  const col = COLUMNS.find(function(c) { return c.key === colKey(status); });
  const color = col ? col.color : '#6b7280';
  return '<span class="inline-block text-xs font-semibold px-2 py-0.5 rounded-full text-white" style="background:' + color + '">' + escHtml(status) + '</span>';
}

// ── MANUAL SMS ───────────────────────────────────────────────────────────────
function renderManualSmsSend(phone) {
  return '<div class="mb-4 border border-gray-200 rounded-lg p-3">' +
    '<div class="section-label">Send Manual SMS</div>' +
    '<div class="flex gap-2">' +
      '<input id="manual-sms-text" type="text" placeholder="Type message…" ' +
        'class="flex-1 border border-gray-200 rounded px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300">' +
      '<button onclick="sendManualSms(\'' + escHtml(phone || '') + '\')" class="action-btn bg-indigo-600 text-white">Send</button>' +
    '</div>' +
  '</div>';
}

async function sendManualSms(phone) {
  if (!phone) { showToast('No phone'); return; }
  const inp = document.getElementById('manual-sms-text');
  const text = inp ? inp.value.trim() : '';
  if (!text) { showToast('Message is empty'); return; }
  appendOptimisticMessage(text);
  inp.value = '';
  try {
    await apiFetch('/admin/send-sms', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Source': 'dashboard' },
      body: JSON.stringify({ to: phone, message: text }),
    });
    showSuccess('✓ Sent');
    fetchAndRenderThread(phone, false);
  } catch (e) { showToast('Send failed: ' + e.message); }
}

// ── LEAD PANEL ───────────────────────────────────────────────────────────────
function renderLeadPanelShell(lead) {
  const ago = lead.last_message_at ? timeAgo(lead.last_message_at) : '';
  return '' +
    '<div class="flex items-center justify-between mb-4">' +
      '<div>' +
        '<h2 class="font-bold text-gray-800 text-base font-mono">' + escHtml(lead.phone) + '</h2>' +
        '<span class="text-xs text-gray-400">Inbound lead &middot; ' + lead.message_count + ' messages &middot; ' + ago + '</span>' +
      '</div>' +
      '<button onclick="closePanel()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none w-8 h-8 flex items-center justify-center">&times;</button>' +
    '</div>' +
    '<div class="mb-4 bg-amber-50 border border-amber-200 rounded-lg px-4 py-3 text-xs text-amber-700">' +
      'Customer is in concierge flow &mdash; no job created yet.' +
    '</div>' +
    renderManualSmsSend(lead.phone) +
    '<div class="mb-3">' +
      '<h3 class="font-semibold text-gray-700 text-sm mb-2">SMS Thread</h3>' +
      '<div id="sms-thread" class="bg-gray-50 rounded-lg p-3 flex flex-col gap-2 overflow-y-auto" style="max-height:240px;min-height:60px;"></div>' +
    '</div>' +
    '<div>' +
      '<h3 class="font-semibold text-gray-700 text-sm mb-2">AI Suggested Reply</h3>' +
      '<div id="ai-section" class="flex items-center gap-2 text-gray-400 text-xs">' + spinnerSvg() + 'Generating suggestion&hellip;</div>' +
    '</div>';
}

// ── JOB PANEL ─────────────────────────────────────────────────────────────────
function renderJobActionsSection(job) {
  const id = escHtml(job.id);
  const phone = escHtml(job.customer_phone || '');

  const statusOpts = ALL_STATUSES.map(function(s) {
    return '<option value="' + s + '"' + (s === job.status ? ' selected' : '') + '>' + s + '</option>';
  }).join('');

  return '<div class="mb-4 border border-gray-200 rounded-lg p-3 flex flex-col gap-3">' +
    '<div class="section-label">Actions</div>' +

    '<div>' +
      '<div class="text-xs text-gray-500 mb-1">Send Manual SMS</div>' +
      '<div class="flex gap-2">' +
        '<input id="manual-sms-text" type="text" placeholder="Type message…" ' +
          'class="flex-1 border border-gray-200 rounded px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300">' +
        '<button onclick="sendManualSms(\'' + phone + '\')" class="action-btn bg-indigo-600 text-white">Send</button>' +
      '</div>' +
    '</div>' +

    '<div>' +
      '<div class="text-xs text-gray-500 mb-1">Move to Status</div>' +
      '<div class="flex gap-2">' +
        '<select id="status-select" class="flex-1 border border-gray-200 rounded px-2 py-1.5 text-sm">' + statusOpts + '</select>' +
        '<button onclick="moveToStatus(\'' + id + '\')" class="action-btn bg-slate-700 text-white">Move</button>' +
      '</div>' +
    '</div>' +

    '<div>' +
      '<div class="text-xs text-gray-500 mb-1">Reschedule</div>' +
      '<div class="flex gap-2">' +
        '<input id="reschedule-input" type="datetime-local" class="flex-1 border border-gray-200 rounded px-2 py-1.5 text-sm">' +
        '<button onclick="confirmReschedule(\'' + id + '\')" class="action-btn bg-purple-600 text-white">Set</button>' +
      '</div>' +
    '</div>' +

    '<div>' +
      '<div class="text-xs text-gray-500 mb-1">Reassign Tech</div>' +
      '<div class="flex gap-2">' +
        '<select id="reassign-select" class="flex-1 border border-gray-200 rounded px-2 py-1.5 text-sm"><option value="">Loading…</option></select>' +
        '<button onclick="confirmReassign(\'' + id + '\')" class="action-btn bg-amber-500 text-white">Assign</button>' +
      '</div>' +
    '</div>' +

    '<div class="flex gap-2 flex-wrap">' +
      '<button onclick="resendPayment(\'' + id + '\')" class="action-btn bg-green-600 text-white">Resend Payment</button>' +
      '<button onclick="markPaidManual(\'' + id + '\')" class="action-btn bg-green-50 text-green-700" style="border:1px solid #a7f3d0">Mark Paid</button>' +
      '<button onclick="markCompleted(\'' + id + '\')" class="action-btn bg-blue-600 text-white">Mark Completed</button>' +
      '<button onclick="cancelJob(\'' + id + '\')" class="action-btn bg-red-50 text-red-600" style="border:1px solid #fecaca">Cancel Job</button>' +
    '</div>' +
  '</div>';
}

function renderPanelShell(job) {
  const techName = job.confirmed_tech_name || job.current_tech_name || '—';
  const payLink = job.stripe_payment_link
    ? (job.paid_at ? '&#10003; Paid' : '&#8987; Unpaid &mdash; link sent')
    : '—';

  let tvBreakdown = '';
  for (let i = 1; i <= 10; i++) {
    const size = job['tv_' + i + '_size'];
    if (!size || size === 'null' || size === 'undefined') continue;
    const inches = job['tv_' + i + '_inches'];
    const mount = job['tv_' + i + '_mount'];
    const wall = job['tv_' + i + '_wall'];
    const wire = job['tv_' + i + '_wire'];
    tvBreakdown +=
      '<div class="text-xs text-gray-600 py-1 border-b border-gray-100 last:border-0">' +
        '<span class="font-medium text-gray-700">TV' + i + '</span>' +
        '<span class="ml-2">' + escHtml(inches ? inches + '"' : size) + '</span>' +
        (mount ? '<span class="ml-1 text-gray-400">&middot; ' + escHtml(mount) + '</span>' : '') +
        (wall ? '<span class="ml-1 text-gray-400">&middot; ' + escHtml(wall) + '</span>' : '') +
        (wire === 'cable' ? '<span class="ml-1 text-indigo-500">&middot; wire</span>' : '') +
      '</div>';
  }

  return '' +
    '<div class="flex items-center justify-between mb-4">' +
      '<h2 class="font-bold text-gray-800 text-base">' + escHtml(job.customer_name || 'Unknown') + '</h2>' +
      '<button onclick="closePanel()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none w-8 h-8 flex items-center justify-center">&times;</button>' +
    '</div>' +

    '<div class="mb-4 bg-gray-50 rounded-lg p-4">' +
      '<div class="grid grid-cols-2 gap-x-4 gap-y-3 text-sm mb-3">' +
        '<div><div class="text-gray-500 text-xs mb-0.5">Phone</div><div class="font-medium text-gray-800">' + escHtml(job.customer_phone || '—') + '</div></div>' +
        '<div><div class="text-gray-500 text-xs mb-0.5">City</div><div class="font-medium text-gray-800">' + escHtml(job.city || '—') + '</div></div>' +
        '<div><div class="text-gray-500 text-xs mb-0.5">Status</div><div class="mt-0.5">' + statusBadge(job.status) + '</div></div>' +
        '<div><div class="text-gray-500 text-xs mb-0.5">Price</div><div class="font-medium text-gray-800">' + escHtml(job.total_price ? '$' + job.total_price : '—') + '</div></div>' +
        '<div><div class="text-gray-500 text-xs mb-0.5">Scheduled</div><div class="font-medium text-gray-800 text-xs">' + escHtml(fmt(job.scheduled_time || job.preferred_time)) + '</div></div>' +
        '<div><div class="text-gray-500 text-xs mb-0.5">Tech</div><div class="font-medium text-gray-800">' + escHtml(techName) + '</div></div>' +
        '<div><div class="text-gray-500 text-xs mb-0.5">Payment</div><div class="font-medium text-gray-800 text-xs">' + payLink + '</div></div>' +
        (job.customer_address ? '<div class="col-span-2"><div class="text-gray-500 text-xs mb-0.5">Address</div><div class="font-medium text-gray-800 text-xs">' + escHtml(job.customer_address) + '</div></div>' : '') +
      '</div>' +
      (tvBreakdown ? '<div class="border-t border-gray-200 pt-2">' + tvBreakdown + '</div>' : '') +
    '</div>' +

    renderJobActionsSection(job) +

    '<div class="mb-3">' +
      '<h3 class="font-semibold text-gray-700 text-sm mb-2">SMS Thread</h3>' +
      '<div id="sms-thread" class="bg-gray-50 rounded-lg p-3 flex flex-col gap-2 overflow-y-auto" style="max-height:240px;min-height:60px;"></div>' +
    '</div>' +

    '<div>' +
      '<h3 class="font-semibold text-gray-700 text-sm mb-2">AI Suggested Reply</h3>' +
      '<div id="ai-section" class="flex items-center gap-2 text-gray-400 text-xs">' + spinnerSvg() + 'Generating suggestion&hellip;</div>' +
    '</div>';
}

// ── AI SUGGESTION (FIX 2) ────────────────────────────────────────────────────
async function loadAiSuggestion(job, phone) {
  let msgs = [];
  if (phone) {
    try {
      msgs = await fetch('/api/conversations/' + encodeURIComponent(phone), { cache: 'no-store' })
        .then(function(r) { return r.json(); })
        .catch(function() { return []; });
    } catch (_) {}
  }
  try {
    const data = await apiFetch('/api/dashboard/suggest-reply', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ job: job || null, messages: msgs }),
    });
    const suggestion = data.suggestion || '';
    if (!suggestion) {
      const el = document.getElementById('ai-section');
      if (el) el.innerHTML = '<div class="text-red-500 text-xs font-medium">AI suggestion returned empty — check Railway logs</div>';
      return;
    }
    renderAiSection(suggestion, phone);
  } catch (e) {
    const el = document.getElementById('ai-section');
    if (el) el.innerHTML = '<div class="text-red-400 text-xs">Could not generate suggestion: ' + escHtml(e.message) + '</div>';
  }
}

function renderAiSection(suggestion, phone) {
  const el = document.getElementById('ai-section');
  if (!el) return;
  const safePhone = escHtml(phone || '');
  el.innerHTML =
    '<div class="w-full">' +
      '<div class="flex flex-col items-end mb-2">' +
        '<div class="max-w-xs px-3 py-2 text-sm bubble-draft">' + escHtml(suggestion) + '</div>' +
        '<span class="text-gray-400 text-xs mt-0.5 px-1">AI draft</span>' +
      '</div>' +
      '<textarea id="reply-text" oninput="updateSendBtn()" ' +
        'class="w-full border border-gray-200 rounded-lg p-3 text-sm text-gray-800 resize-none focus:outline-none focus:ring-2 focus:ring-indigo-300" rows="3">' +
        escHtml(suggestion) +
      '</textarea>' +
      '<div class="flex items-center gap-3 mt-2">' +
        '<button id="send-btn" onclick="sendReplyToPhone(\'' + safePhone + '\')" ' +
          'class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm px-4 py-2 rounded-lg transition font-medium disabled:opacity-40 disabled:cursor-default">Send</button>' +
        '<span id="send-status" class="text-sm text-green-600 hidden">Sent &#10003;</span>' +
      '</div>' +
    '</div>';
  updateSendBtn();
}

function updateSendBtn() {
  const btn = document.getElementById('send-btn');
  const ta = document.getElementById('reply-text');
  if (btn && ta) btn.disabled = !ta.value.trim();
}

async function sendReplyToPhone(phone) {
  if (!phone) { showToast('No phone number'); return; }
  const textarea = document.getElementById('reply-text');
  if (!textarea) return;
  const text = textarea.value.trim();
  if (!text) { showToast('Message is empty'); return; }

  appendOptimisticMessage(text);
  textarea.value = '';
  updateSendBtn();

  try {
    await apiFetch('/admin/send-sms', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Source': 'dashboard' },
      body: JSON.stringify({ to: phone, message: text }),
    });
    const statusEl = document.getElementById('send-status');
    if (statusEl) { statusEl.classList.remove('hidden'); setTimeout(function() { statusEl.classList.add('hidden'); }, 3000); }
    fetchAndRenderThread(phone, false);
  } catch (e) { showToast('Send failed: ' + e.message); }
}

// ── ACTIONS ──────────────────────────────────────────────────────────────────
async function patchJob(jobId, fields) {
  await apiFetch('/api/jobs/' + jobId, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(fields),
  });
}

async function afterAction(jobId) {
  showSuccess('✓ Done');
  const [jobs, leads] = await Promise.all([
    apiFetch('/jobs?limit=300'),
    apiFetch('/api/leads').catch(function() { return allLeads; }),
  ]);
  allJobs = Array.isArray(jobs) ? jobs : allJobs;
  allLeads = Array.isArray(leads) ? leads : allLeads;
  renderBoard(allJobs, allLeads);
  if (jobId) {
    const job = allJobs.find(function(j) { return j.id === jobId; });
    if (job) {
      document.getElementById('panel-content').innerHTML = renderPanelShell(job);
      loadTechsForPanel();
      if (job.customer_phone) fetchAndRenderThread(job.customer_phone, false);
    }
  }
}

async function loadTechsForPanel() {
  const sel = document.getElementById('reassign-select');
  if (!sel) return;
  try {
    const techs = await apiFetch('/jobs/techs/list');
    sel.innerHTML = techs.map(function(t) {
      return '<option value="' + escHtml(t.id) + '">' + escHtml(t.name) + ' (' + escHtml(t.phone) + ')</option>';
    }).join('');
  } catch (_) {}
}

async function moveToStatus(jobId) {
  const sel = document.getElementById('status-select');
  if (!sel) return;
  try { await patchJob(jobId, { status: sel.value }); await afterAction(jobId); }
  catch (e) { showToast('Error: ' + e.message); }
}

async function confirmReschedule(jobId) {
  const input = document.getElementById('reschedule-input');
  if (!input || !input.value) { showToast('Pick a date/time'); return; }
  try {
    await patchJob(jobId, { preferred_time: new Date(input.value).toISOString(), scheduled_time: new Date(input.value).toISOString(), status: 'awaiting_time_confirm' });
    await afterAction(jobId);
  } catch (e) { showToast('Error: ' + e.message); }
}

async function confirmReassign(jobId) {
  const sel = document.getElementById('reassign-select');
  if (!sel || !sel.value) { showToast('Select a tech'); return; }
  const techName = sel.options[sel.selectedIndex] ? sel.options[sel.selectedIndex].text.split(' (')[0] : '';
  try {
    await patchJob(jobId, { confirmed_tech_id: sel.value, confirmed_tech_name: techName, status: 'awaiting_tech_reply' });
    await afterAction(jobId);
  } catch (e) { showToast('Error: ' + e.message); }
}

async function resendPayment(jobId) {
  try {
    await apiFetch('/api/jobs/' + jobId + '/resend-payment', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
    showSuccess('✓ Payment link resent');
  } catch (e) {
    showToast(e.message.includes('404') || e.message.includes('Not Found') ? 'not wired — send payment link manually via SMS' : 'Error: ' + e.message);
  }
}

async function markPaidManual(jobId) {
  try { await patchJob(jobId, { paid_at: new Date().toISOString(), status: 'confirmed' }); await afterAction(jobId); }
  catch (e) { showToast('Error: ' + e.message); }
}

async function markCompleted(jobId) {
  try {
    await apiFetch('/jobs/' + jobId + '/complete', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
    await afterAction(jobId);
  } catch (e) { showToast('Error: ' + e.message); }
}

async function cancelJob(jobId) {
  try { await patchJob(jobId, { status: 'cancelled', cancelled_at: new Date().toISOString() }); await afterAction(jobId); }
  catch (e) { showToast('Error: ' + e.message); }
}

// ── REFRESH ───────────────────────────────────────────────────────────────────
async function refreshBoard() {
  try {
    const [jobs, leads] = await Promise.all([
      apiFetch('/jobs?limit=300'),
      apiFetch('/api/leads').catch(function() { return []; }),
    ]);
    allJobs = Array.isArray(jobs) ? jobs : [];
    allLeads = Array.isArray(leads) ? leads : [];
    renderBoard(allJobs, allLeads);
    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    await checkKillSwitch();
  } catch (e) { showToast('Refresh failed: ' + e.message); }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
refreshBoard();
startBoardAutoRefresh();
</script>
