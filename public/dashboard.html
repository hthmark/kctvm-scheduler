<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KCTVM Scheduler Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
    header { background: #1a1a2e; color: white; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 1.2rem; font-weight: 600; }
    .badge { background: #e94560; color: white; border-radius: 12px; padding: 2px 8px; font-size: 0.75rem; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: white; border-radius: 8px; padding: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .stat-card .label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: .5px; }
    .stat-card .value { font-size: 1.8rem; font-weight: 700; margin-top: 4px; }
    .stat-card .value.green { color: #16a34a; }
    .stat-card .value.blue { color: #2563eb; }
    .stat-card .value.amber { color: #d97706; }
    .stat-card .value.red { color: #dc2626; }
    .section { background: white; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 24px; overflow: hidden; }
    .section-header { padding: 14px 20px; border-bottom: 1px solid #f0f0f0; font-weight: 600; font-size: 0.9rem; display: flex; justify-content: space-between; align-items: center; }
    .refresh-btn { background: #e0e7ff; color: #3730a3; border: none; border-radius: 6px; padding: 4px 12px; font-size: 0.8rem; cursor: pointer; }
    .refresh-btn:hover { background: #c7d2fe; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { background: #fafafa; padding: 10px 16px; text-align: left; font-weight: 600; color: #555; font-size: 0.78rem; text-transform: uppercase; letter-spacing: .4px; border-bottom: 1px solid #eee; }
    td { padding: 10px 16px; border-bottom: 1px solid #f5f5f5; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .status-pill { display: inline-block; border-radius: 12px; padding: 2px 10px; font-size: 0.75rem; font-weight: 500; white-space: nowrap; }
    .pill-confirmed { background: #dcfce7; color: #16a34a; }
    .pill-awaiting_tech_reply { background: #fef3c7; color: #b45309; }
    .pill-awaiting_payment { background: #dbeafe; color: #1d4ed8; }
    .pill-completed { background: #f0fdf4; color: #166534; }
    .pill-cancelled { background: #fee2e2; color: #991b1b; }
    .pill-no_tech_available { background: #fce7f3; color: #9d174d; }
    .pill-default { background: #f3f4f6; color: #374151; }
    .sms-form { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .sms-form input, .sms-form textarea { border: 1px solid #ddd; border-radius: 6px; padding: 8px 12px; font-size: 0.9rem; width: 100%; font-family: inherit; }
    .sms-form textarea { resize: vertical; min-height: 80px; }
    .send-btn { background: #1a1a2e; color: white; border: none; border-radius: 6px; padding: 10px 20px; font-size: 0.9rem; cursor: pointer; align-self: flex-start; }
    .send-btn:hover { background: #2d2d4e; }
    .send-btn:disabled { opacity: .5; cursor: default; }
    .result-msg { font-size: 0.85rem; padding: 8px 12px; border-radius: 6px; }
    .result-ok { background: #dcfce7; color: #166534; }
    .result-err { background: #fee2e2; color: #991b1b; }
    .empty { padding: 32px; text-align: center; color: #aaa; font-size: 0.9rem; }
    .last-updated { font-size: 0.75rem; color: #aaa; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
const { createElement: h, useState, useEffect, useCallback } = React;

const STATUS_PILLS = {
  confirmed: 'pill-confirmed',
  awaiting_tech_reply: 'pill-awaiting_tech_reply',
  awaiting_payment: 'pill-awaiting_payment',
  completed: 'pill-completed',
  cancelled: 'pill-cancelled',
  no_tech_available: 'pill-no_tech_available',
};

function StatusPill({ status }) {
  const cls = STATUS_PILLS[status] || 'pill-default';
  return h('span', { className: `status-pill ${cls}` }, status.replace(/_/g, ' '));
}

function StatCard({ label, value, color }) {
  return h('div', { className: 'stat-card' },
    h('div', { className: 'label' }, label),
    h('div', { className: `value ${color || ''}` }, value)
  );
}

function JobsTable({ jobs }) {
  if (!jobs.length) return h('div', { className: 'empty' }, 'No jobs found');
  return h('table', null,
    h('thead', null,
      h('tr', null,
        h('th', null, 'Customer'),
        h('th', null, 'City'),
        h('th', null, 'Time'),
        h('th', null, 'Status'),
        h('th', null, 'Tech'),
        h('th', null, 'Total'),
        h('th', null, 'Created'),
      )
    ),
    h('tbody', null,
      jobs.map(j => h('tr', { key: j.id },
        h('td', null, j.customer_name || '—'),
        h('td', null, j.city || '—'),
        h('td', null, j.preferred_time ? new Date(j.preferred_time).toLocaleString() : '—'),
        h('td', null, h(StatusPill, { status: j.status })),
        h('td', null, j.confirmed_tech_name || j.current_tech_name || '—'),
        h('td', null, j.total_price ? `$${j.total_price}` : '—'),
        h('td', null, j.created_at ? new Date(j.created_at).toLocaleDateString() : '—'),
      ))
    )
  );
}

function SendSMSPanel() {
  const [to, setTo] = useState('');
  const [message, setMessage] = useState('');
  const [sending, setSending] = useState(false);
  const [result, setResult] = useState(null);

  async function handleSend() {
    if (!to || !message) return;
    setSending(true);
    setResult(null);
    try {
      const resp = await fetch('/admin/send-sms', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ to, message }),
      });
      const data = await resp.json();
      setResult(resp.ok ? { ok: true, text: 'Sent!' } : { ok: false, text: data.error || 'Failed' });
      if (resp.ok) { setTo(''); setMessage(''); }
    } catch (e) {
      setResult({ ok: false, text: e.message });
    }
    setSending(false);
  }

  return h('div', { className: 'sms-form' },
    h('input', { type: 'tel', placeholder: '+1XXXXXXXXXX', value: to, onChange: e => setTo(e.target.value) }),
    h('textarea', { placeholder: 'Message…', value: message, onChange: e => setMessage(e.target.value) }),
    h('button', { className: 'send-btn', onClick: handleSend, disabled: sending || !to || !message },
      sending ? 'Sending…' : 'Send SMS'),
    result && h('div', { className: `result-msg ${result.ok ? 'result-ok' : 'result-err'}` }, result.text)
  );
}

function Dashboard() {
  const [stats, setStats] = useState(null);
  const [jobs, setJobs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [lastUpdated, setLastUpdated] = useState(null);

  const load = useCallback(async () => {
    try {
      const [sRes, jRes] = await Promise.all([
        fetch('/jobs/stats/summary'),
        fetch('/jobs?limit=50'),
      ]);
      setStats(await sRes.json());
      setJobs(await jRes.json());
      setLastUpdated(new Date().toLocaleTimeString());
    } catch (e) { console.error(e); }
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load]);

  return h('div', null,
    h('header', null,
      h('h1', null, '📺 KCTVM Scheduler'),
      lastUpdated && h('span', { className: 'last-updated' }, `Updated ${lastUpdated}`)
    ),
    h('div', { className: 'container' },
      loading
        ? h('div', { className: 'empty' }, 'Loading…')
        : h('div', null,
            stats && h('div', { className: 'stats' },
              h(StatCard, { label: 'Total Jobs', value: stats.total }),
              h(StatCard, { label: 'Today', value: stats.today, color: 'blue' }),
              h(StatCard, { label: 'Awaiting Tech', value: stats.awaiting_tech, color: 'amber' }),
              h(StatCard, { label: 'Awaiting Payment', value: stats.awaiting_payment, color: 'amber' }),
              h(StatCard, { label: 'Confirmed', value: stats.confirmed, color: 'blue' }),
              h(StatCard, { label: 'Completed', value: stats.completed, color: 'green' }),
              h(StatCard, { label: 'Cancelled', value: stats.cancelled, color: 'red' }),
              h(StatCard, { label: 'Revenue', value: `$${(stats.revenue_total || 0).toFixed(0)}`, color: 'green' }),
            ),
            h('div', { className: 'section' },
              h('div', { className: 'section-header' },
                h('span', null, `Recent Jobs (${jobs.length})`),
                h('button', { className: 'refresh-btn', onClick: load }, 'Refresh')
              ),
              h(JobsTable, { jobs })
            ),
            h('div', { className: 'section' },
              h('div', { className: 'section-header' }, 'Send SMS'),
              h(SendSMSPanel)
            )
          )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(Dashboard));
</script>
</body>
</html>
