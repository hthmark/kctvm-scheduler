<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KCTVM Ops Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .board-col { min-width: 260px; max-width: 260px; }
    .card-border-new                   { border-left: 4px solid #6b7280; }
    .card-border-scheduling            { border-left: 4px solid #818cf8; }
    .card-border-awaiting_time_confirm { border-left: 4px solid #a78bfa; }
    .card-border-tech_search           { border-left: 4px solid #f59e0b; }
    .card-border-awaiting_tech_reply   { border-left: 4px solid #fbbf24; }
    .card-border-awaiting_payment      { border-left: 4px solid #34d399; }
    .card-border-confirmed             { border-left: 4px solid #10b981; }
    .card-border-completed             { border-left: 4px solid #3b82f6; }
    .card-border-cancelled             { border-left: 4px solid #ef4444; }
    .bubble-user      { background: #f1f5f9; border-radius: 12px 12px 12px 2px; align-self: flex-start; }
    .bubble-assistant { background: #1e40af; color: #fff; border-radius: 12px 12px 2px 12px; align-self: flex-end; }
    .panel-open   { transform: translateX(0); }
    .panel-closed { transform: translateX(100%); }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 14px; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .action-btn { font-size: 13px; padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: opacity 0.2s; border: none; }
    .action-btn:hover:not(:disabled) { opacity: 0.8; }
    .action-btn:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

<!-- Header -->
<header class="bg-gray-900 text-white flex items-center justify-between px-6 py-3 shrink-0 shadow-lg z-10">
  <div class="flex items-center gap-3">
    <span class="font-bold text-lg tracking-tight">KCTVM Ops</span>
    <span class="text-gray-500 text-sm">Dashboard</span>
  </div>
  <div class="flex items-center gap-2 text-sm">
    <div id="ks-dot" class="w-2.5 h-2.5 rounded-full bg-gray-500"></div>
    <span id="ks-label" class="text-gray-400 text-sm">Checking...</span>
  </div>
  <div class="flex items-center gap-3">
    <span id="last-updated" class="text-gray-500 text-xs"></span>
    <button onclick="refreshBoard()" class="bg-gray-700 hover:bg-gray-600 text-white text-sm px-3 py-1.5 rounded-md transition">&#8635; Refresh</button>
  </div>
</header>

<!-- Kill switch banner -->
<div id="ks-banner" class="hidden bg-red-600 text-white text-center text-sm py-2 font-medium shrink-0">
  &#9888; SYSTEM KILL SWITCH IS ON &mdash; AI responses paused
</div>

<!-- Board + Panel wrapper -->
<div class="flex-1 overflow-hidden flex relative">

  <!-- Kanban board -->
  <div id="board" class="flex gap-4 p-4 overflow-x-auto flex-1 items-start">
    <!-- columns injected by JS -->
  </div>

  <!-- Detail panel -->
  <div id="detail-panel"
       class="absolute top-0 right-0 h-full bg-white border-l border-gray-200 shadow-2xl overflow-y-auto transition-transform duration-300 panel-closed"
       style="width:420px;">
    <div id="panel-content" class="p-5 min-h-full"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const COLUMNS = [
  { key: 'new',                   label: 'New',                   color: '#6b7280', hdr: '#f9fafb' },
  { key: 'scheduling',            label: 'Scheduling',            color: '#818cf8', hdr: '#eef2ff' },
  { key: 'awaiting_time_confirm', label: 'Awaiting Time Confirm', color: '#a78bfa', hdr: '#f5f3ff' },
  { key: 'tech_search',           label: 'Tech Search',           color: '#f59e0b', hdr: '#fffbeb' },
  { key: 'awaiting_tech_reply',   label: 'Awaiting Tech Reply',   color: '#fbbf24', hdr: '#fefce8' },
  { key: 'awaiting_payment',      label: 'Awaiting Payment',      color: '#34d399', hdr: '#f0fdf4' },
  { key: 'confirmed',             label: 'Confirmed',             color: '#10b981', hdr: '#ecfdf5' },
  { key: 'completed',             label: 'Completed',             color: '#3b82f6', hdr: '#eff6ff' },
  { key: 'cancelled',             label: 'Cancelled / No Tech',   color: '#ef4444', hdr: '#fef2f2' },
];

function colKey(status) {
  if (status === 'no_tech_available') return 'cancelled';
  return status;
}

let allJobs = [];
let allLeads = [];
let selectedJobId = null;
let smsPollingInterval = null;
let currentPanelPhone = null;

// ── UTILS ─────────────────────────────────────────────────────────────────────
function timeAgo(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

function fmt(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('en-US', {
    timeZone: 'America/Chicago', month: 'short', day: 'numeric',
    hour: 'numeric', minute: '2-digit', hour12: true,
  });
}

function firstN(str) {
  if (!str) return '?';
  return str.split(' ')[0];
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, dur) {
  dur = dur || 3000;
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, dur);
}

async function apiFetch(path, opts) {
  const r = await fetch(path, opts || {});
  if (!r.ok) {
    const err = await r.json().catch(function() { return {}; });
    throw new Error(err.error || r.statusText);
  }
  return r.json();
}

function countTvs(job) {
  let n = 0;
  for (let i = 1; i <= 10; i++) {
    const s = job['tv_' + i + '_size'];
    if (s && s !== 'null' && s !== 'undefined') n++;
  }
  return n || 1;
}

// ── SMS POLLING ───────────────────────────────────────────────────────────────
function startSmsPolling(phone) {
  stopSmsPolling();
  currentPanelPhone = phone;
  smsPollingInterval = setInterval(function() {
    loadSmsThreadByPhone(phone);
  }, 5000);
}

function stopSmsPolling() {
  if (smsPollingInterval) {
    clearInterval(smsPollingInterval);
    smsPollingInterval = null;
  }
  currentPanelPhone = null;
}

async function loadSmsThreadByPhone(phone) {
  const el = document.getElementById('sms-thread');
  if (!el || !phone) return;
  try {
    const msgs = await apiFetch('/api/sms_conversations?phone=eq.' + encodeURIComponent(phone) + '&order=created_at.asc');
    renderSmsThread(msgs);
  } catch (_) {}
}

function renderSmsThread(msgs) {
  const el = document.getElementById('sms-thread');
  if (!el) return;
  if (!msgs || msgs.length === 0) {
    el.innerHTML = '<div class="text-gray-400 text-xs text-center py-3">No messages yet</div>';
    return;
  }
  const atBottom = el.scrollHeight - el.scrollTop <= el.clientHeight + 20;
  el.innerHTML = msgs.map(function(m) {
    const isUser = m.role === 'user';
    const ts = m.created_at
      ? new Date(m.created_at).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })
      : '';
    return '<div class="flex flex-col ' + (isUser ? 'items-start' : 'items-end') + '">' +
      '<div class="max-w-xs px-3 py-2 text-sm ' + (isUser ? 'bubble-user text-gray-800' : 'bubble-assistant') + '">' + escHtml(m.content || '') + '</div>' +
      '<span class="text-gray-400 text-xs mt-0.5 px-1">' + ts + '</span>' +
    '</div>';
  }).join('');
  if (atBottom) el.scrollTop = el.scrollHeight;
}

// ── KILL SWITCH ──────────────────────────────────────────────────────────────
async function checkKillSwitch() {
  try {
    const data = await apiFetch('/api/system-status');
    const enabled = data.enabled;
    const dot = document.getElementById('ks-dot');
    const lbl = document.getElementById('ks-label');
    const banner = document.getElementById('ks-banner');
    if (enabled) {
      dot.className = 'w-2.5 h-2.5 rounded-full bg-green-400';
      lbl.textContent = 'System ON';
      lbl.className = 'text-green-400 text-sm';
      banner.classList.add('hidden');
    } else {
      dot.className = 'w-2.5 h-2.5 rounded-full bg-red-500';
      lbl.textContent = 'Kill Switch ON';
      lbl.className = 'text-red-400 text-sm';
      banner.classList.remove('hidden');
    }
  } catch (_) {}
}

// ── BOARD ─────────────────────────────────────────────────────────────────────
function renderBoard(jobs, leads) {
  const board = document.getElementById('board');
  const byCol = {};
  COLUMNS.forEach(function(c) { byCol[c.key] = []; });

  jobs.forEach(function(j) {
    const k = colKey(j.status);
    if (byCol[k]) byCol[k].push(j);
  });

  board.innerHTML = '';
  COLUMNS.forEach(function(col) {
    const colJobs = byCol[col.key] || [];
    const div = document.createElement('div');
    div.className = 'board-col flex-none flex flex-col gap-2';

    // Job cards
    let cardsHtml = colJobs.map(function(j) {
      const techName = j.confirmed_tech_name || j.current_tech_name || null;
      const tvs = j.num_tvs || countTvs(j);
      const price = j.total_price ? '$' + j.total_price : '';
      const ago = j.created_at ? timeAgo(j.created_at) : '';
      const borderClass = 'card-border-' + colKey(j.status);
      return '<div class="bg-white rounded-lg shadow-sm p-3 cursor-pointer hover:shadow-md transition ' + borderClass + '" onclick="openPanel(\'' + j.id + '\')">' +
        '<div class="flex items-center justify-between mb-1">' +
          '<span class="font-semibold text-gray-800 text-sm">' + escHtml(firstN(j.customer_name)) + '</span>' +
          '<span class="text-gray-400 text-xs">' + ago + '</span>' +
        '</div>' +
        '<div class="text-gray-500 text-xs mb-1">' + escHtml(j.customer_city || '') + '</div>' +
        '<div class="flex items-center gap-2 text-xs text-gray-600">' +
          '<span>' + tvs + ' TV' + (tvs !== 1 ? 's' : '') + '</span>' +
          (price ? '<span class="font-medium text-gray-700">' + price + '</span>' : '') +
          (techName ? '<span class="ml-auto text-indigo-500 truncate max-w-20">' + escHtml(firstN(techName)) + '</span>' : '') +
        '</div>' +
      '</div>';
    }).join('');

    // Lead cards (only in New column)
    let leadCardsHtml = '';
    let totalCount = colJobs.length;
    if (col.key === 'new' && leads && leads.length > 0) {
      totalCount += leads.length;
      leadCardsHtml = leads.map(function(lead, idx) {
        const ago = lead.last_message_at ? timeAgo(lead.last_message_at) : '';
        const preview = lead.last_message ? lead.last_message.slice(0, 60) + (lead.last_message.length > 60 ? '…' : '') : '';
        return '<div class="bg-white rounded-lg shadow-sm p-3 cursor-pointer hover:shadow-md transition border-l-4" style="border-left-color:#9ca3af;opacity:0.9" onclick="openLeadPanel(' + idx + ')">' +
          '<div class="flex items-center justify-between mb-1">' +
            '<span class="font-semibold text-gray-600 text-sm font-mono">' + escHtml(lead.phone) + '</span>' +
            '<span class="text-gray-400 text-xs">' + ago + '</span>' +
          '</div>' +
          '<div class="text-gray-500 text-xs mb-1 truncate">' + escHtml(preview) + '</div>' +
          '<div class="flex items-center gap-2 text-xs text-gray-400">' +
            '<span class="bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded text-xs">Lead</span>' +
            '<span>' + lead.message_count + ' msg' + (lead.message_count !== 1 ? 's' : '') + '</span>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    div.innerHTML =
      '<div class="rounded-lg px-3 py-2 flex items-center justify-between mb-1" style="background:' + col.hdr + ';border-top:3px solid ' + col.color + '">' +
        '<span class="font-semibold text-gray-700 text-sm">' + col.label + '</span>' +
        '<span class="text-xs font-bold px-2 py-0.5 rounded-full text-white" style="background:' + col.color + '">' + totalCount + '</span>' +
      '</div>' +
      '<div class="flex flex-col gap-2 overflow-y-auto pr-0.5" style="max-height:calc(100vh - 130px)">' +
        (cardsHtml + leadCardsHtml || '<div class="text-gray-400 text-xs text-center py-4">Empty</div>') +
      '</div>';

    board.appendChild(div);
  });
}

// ── DETAIL PANEL — JOB ───────────────────────────────────────────────────────
async function openPanel(jobId) {
  const job = allJobs.find(function(j) { return j.id === jobId; });
  if (!job) return;
  selectedJobId = jobId;

  const panel = document.getElementById('detail-panel');
  panel.classList.remove('panel-closed');
  panel.classList.add('panel-open');

  document.getElementById('panel-content').innerHTML = renderPanelShell(job);

  const phone = job.customer_phone;
  await loadSmsThreadByPhone(phone);
  loadAiSuggestion(job, phone);
  if (phone) startSmsPolling(phone);
}

// ── DETAIL PANEL — LEAD ──────────────────────────────────────────────────────
async function openLeadPanel(idx) {
  const lead = allLeads[idx];
  if (!lead) return;
  selectedJobId = null;

  const panel = document.getElementById('detail-panel');
  panel.classList.remove('panel-closed');
  panel.classList.add('panel-open');

  document.getElementById('panel-content').innerHTML = renderLeadPanelShell(lead);

  await loadSmsThreadByPhone(lead.phone);
  loadAiSuggestion(null, lead.phone);
  startSmsPolling(lead.phone);
}

function closePanel() {
  stopSmsPolling();
  const panel = document.getElementById('detail-panel');
  panel.classList.add('panel-closed');
  panel.classList.remove('panel-open');
  selectedJobId = null;
}

function statusBadge(status) {
  const col = COLUMNS.find(function(c) { return c.key === colKey(status); });
  const color = col ? col.color : '#6b7280';
  return '<span class="inline-block text-xs font-semibold px-2 py-0.5 rounded-full text-white" style="background:' + color + '">' + escHtml(status) + '</span>';
}

function renderLeadPanelShell(lead) {
  const ago = lead.last_message_at ? timeAgo(lead.last_message_at) : '';
  return '' +
    '<div class="flex items-center justify-between mb-4">' +
      '<div>' +
        '<h2 class="font-bold text-gray-800 text-base font-mono">' + escHtml(lead.phone) + '</h2>' +
        '<span class="text-xs text-gray-400">Inbound lead &middot; ' + lead.message_count + ' messages &middot; ' + ago + '</span>' +
      '</div>' +
      '<button onclick="closePanel()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none w-8 h-8 flex items-center justify-center">&times;</button>' +
    '</div>' +

    '<div class="mb-4 bg-amber-50 border border-amber-200 rounded-lg px-4 py-3 text-xs text-amber-700">' +
      'No job created yet — customer is mid-concierge flow.' +
    '</div>' +

    '<div class="mb-3">' +
      '<h3 class="font-semibold text-gray-700 text-sm mb-2">SMS Thread</h3>' +
      '<div id="sms-thread" class="bg-gray-50 rounded-lg p-3 flex flex-col gap-2 overflow-y-auto" style="max-height:280px;min-height:60px;">' +
        '<div class="text-gray-400 text-xs text-center py-3">Loading&hellip;</div>' +
      '</div>' +
    '</div>' +

    '<div>' +
      '<h3 class="font-semibold text-gray-700 text-sm mb-2">AI Suggested Reply</h3>' +
      '<div id="ai-section" class="flex items-center gap-2 text-gray-400 text-xs">' +
        '<svg class="spin w-4 h-4 text-indigo-400 shrink-0" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>' +
        'Generating suggestion&hellip;' +
      '</div>' +
    '</div>';
}

function renderPanelShell(job) {
  const techName = job.confirmed_tech_name || job.current_tech_name || '—';
  const payLink = job.stripe_payment_link
    ? (job.paid_at ? '&#10003; Paid' : '&#8987; Unpaid &mdash; link sent')
    : '—';

  let tvBreakdown = '';
  for (let i = 1; i <= 10; i++) {
    const size = job['tv_' + i + '_size'];
    if (!size || size === 'null' || size === 'undefined') continue;
    const inches = job['tv_' + i + '_inches'];
    const mount = job['tv_' + i + '_mount'];
    const wall = job['tv_' + i + '_wall'];
    const wire = job['tv_' + i + '_wire'];
    tvBreakdown +=
      '<div class="text-xs text-gray-600 py-1 border-b border-gray-100 last:border-0">' +
        '<span class="font-medium text-gray-700">TV' + i + '</span>' +
        '<span class="ml-2">' + escHtml(inches ? inches + '"' : size) + '</span>' +
        (mount ? '<span class="ml-1 text-gray-400">&middot; ' + escHtml(mount) + '</span>' : '') +
        (wall ? '<span class="ml-1 text-gray-400">&middot; ' + escHtml(wall) + '</span>' : '') +
        (wire === 'cable' ? '<span class="ml-1 text-indigo-500">&middot; wire</span>' : '') +
      '</div>';
  }

  const status = job.status;
  let actions = '';
  if (status === 'new' || status === 'scheduling') {
    actions = '<button class="action-btn bg-indigo-50 text-indigo-700" style="border:1px solid #c7d2fe" disabled>Open Concierge Flow</button>';
  } else if (status === 'awaiting_payment') {
    actions = '<button class="action-btn bg-green-50 text-green-700" style="border:1px solid #a7f3d0" onclick="resendPayment(\'' + job.id + '\')">Resend Payment Link</button>';
  } else if (status === 'tech_search' || status === 'awaiting_tech_reply') {
    actions = '<button class="action-btn bg-amber-50 text-amber-700" style="border:1px solid #fde68a" onclick="dispatchTech(\'' + job.id + '\')">Dispatch Next Tech</button>';
  } else if (status === 'confirmed') {
    actions = '<button class="action-btn bg-blue-50 text-blue-700" style="border:1px solid #bfdbfe" onclick="markCompleted(\'' + job.id + '\')">Mark Completed</button>';
  } else if (status === 'cancelled' || status === 'no_tech_available') {
    actions = '<span class="text-sm text-gray-500 italic">Job Cancelled</span>';
  }

  return '' +
    '<div class="flex items-center justify-between mb-4">' +
      '<h2 class="font-bold text-gray-800 text-base">' + escHtml(job.customer_name || 'Unknown') + '</h2>' +
      '<button onclick="closePanel()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none w-8 h-8 flex items-center justify-center">&times;</button>' +
    '</div>' +

    '<div class="mb-4 bg-gray-50 rounded-lg p-4">' +
      '<div class="grid grid-cols-2 gap-x-4 gap-y-3 text-sm mb-3">' +
        '<div><div class="text-gray-500 text-xs mb-0.5">Phone</div><div class="font-medium text-gray-800">' + escHtml(job.customer_phone || '—') + '</div></div>' +
        '<div><div class="text-gray-500 text-xs mb-0.5">City</div><div class="font-medium text-gray-800">' + escHtml(job.customer_city || '—') + '</div></div>' +
        '<div><div class="text-gray-500 text-xs mb-0.5">Status</div><div class="mt-0.5">' + statusBadge(job.status) + '</div></div>' +
        '<div><div class="text-gray-500 text-xs mb-0.5">Price</div><div class="font-medium text-gray-800">' + escHtml(job.total_price ? '$' + job.total_price : '—') + '</div></div>' +
        '<div><div class="text-gray-500 text-xs mb-0.5">Scheduled</div><div class="font-medium text-gray-800 text-xs">' + escHtml(fmt(job.preferred_time)) + '</div></div>' +
        '<div><div class="text-gray-500 text-xs mb-0.5">Tech</div><div class="font-medium text-gray-800">' + escHtml(techName) + '</div></div>' +
        '<div><div class="text-gray-500 text-xs mb-0.5">Payment</div><div class="font-medium text-gray-800 text-xs">' + payLink + '</div></div>' +
        (job.customer_address ? '<div class="col-span-2"><div class="text-gray-500 text-xs mb-0.5">Address</div><div class="font-medium text-gray-800 text-xs">' + escHtml(job.customer_address) + '</div></div>' : '') +
      '</div>' +
      (tvBreakdown ? '<div class="border-t border-gray-200 pt-2">' + tvBreakdown + '</div>' : '') +
    '</div>' +

    (actions ? '<div class="flex gap-2 flex-wrap mb-4">' + actions + '</div>' : '') +

    '<div class="mb-3">' +
      '<h3 class="font-semibold text-gray-700 text-sm mb-2">SMS Thread</h3>' +
      '<div id="sms-thread" class="bg-gray-50 rounded-lg p-3 flex flex-col gap-2 overflow-y-auto" style="max-height:280px;min-height:60px;">' +
        '<div class="text-gray-400 text-xs text-center py-3">Loading&hellip;</div>' +
      '</div>' +
    '</div>' +

    '<div>' +
      '<h3 class="font-semibold text-gray-700 text-sm mb-2">AI Suggested Reply</h3>' +
      '<div id="ai-section" class="flex items-center gap-2 text-gray-400 text-xs">' +
        '<svg class="spin w-4 h-4 text-indigo-400 shrink-0" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>' +
        'Generating suggestion&hellip;' +
      '</div>' +
    '</div>';
}

async function loadAiSuggestion(job, phone) {
  let msgs = [];
  if (phone) {
    try {
      msgs = await apiFetch('/api/sms_conversations?phone=eq.' + encodeURIComponent(phone) + '&order=created_at.asc');
    } catch (_) {}
  }
  try {
    const data = await apiFetch('/api/dashboard/suggest-reply', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ job: job || null, messages: msgs }),
    });
    renderAiSection(data.suggestion || '', phone);
  } catch (e) {
    const el = document.getElementById('ai-section');
    if (el) el.innerHTML = '<div class="text-red-400 text-xs">Could not generate suggestion: ' + escHtml(e.message) + '</div>';
  }
}

function renderAiSection(suggestion, phone) {
  const el = document.getElementById('ai-section');
  if (!el) return;
  const safePhone = escHtml(phone || '');
  el.innerHTML =
    '<div class="w-full">' +
      '<textarea id="reply-text" class="w-full border border-gray-200 rounded-lg p-3 text-sm text-gray-800 resize-none focus:outline-none focus:ring-2 focus:ring-indigo-300" rows="4">' + escHtml(suggestion) + '</textarea>' +
      '<div class="flex items-center gap-3 mt-2">' +
        '<button onclick="sendReplyToPhone(\'' + safePhone + '\')" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm px-4 py-2 rounded-lg transition font-medium">Send</button>' +
        '<span id="send-status" class="text-sm text-green-600 hidden">Sent &#10003;</span>' +
      '</div>' +
    '</div>';
}

async function sendReplyToPhone(phone) {
  if (!phone) { showToast('No phone number'); return; }
  const textarea = document.getElementById('reply-text');
  if (!textarea) return;
  const text = textarea.value.trim();
  if (!text) { showToast('Message is empty'); return; }

  try {
    await apiFetch('/admin/send-sms', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Source': 'dashboard' },
      body: JSON.stringify({ to: phone, message: text }),
    });
    const statusEl = document.getElementById('send-status');
    if (statusEl) {
      statusEl.classList.remove('hidden');
      setTimeout(function() { statusEl.classList.add('hidden'); }, 3000);
    }
    await loadSmsThreadByPhone(phone);
  } catch (e) {
    showToast('Send failed: ' + e.message);
  }
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
async function markCompleted(jobId) {
  try {
    await apiFetch('/jobs/' + jobId + '/complete', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
    showToast('Job marked completed');
    closePanel();
    await refreshBoard();
  } catch (e) {
    showToast('Error: ' + e.message);
  }
}

async function dispatchTech(jobId) {
  console.warn('[Dashboard] Dispatch Next Tech endpoint not yet wired for job', jobId);
  showToast('Endpoint not yet wired');
}

async function resendPayment(jobId) {
  console.warn('[Dashboard] Resend Payment Link endpoint not yet wired for job', jobId);
  showToast('Endpoint not yet wired');
}

// ── REFRESH ───────────────────────────────────────────────────────────────────
async function refreshBoard() {
  try {
    const [jobs, leads] = await Promise.all([
      apiFetch('/jobs?limit=300'),
      apiFetch('/api/leads').catch(function() { return []; }),
    ]);
    allJobs = Array.isArray(jobs) ? jobs : [];
    allLeads = Array.isArray(leads) ? leads : [];
    renderBoard(allJobs, allLeads);
    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    await checkKillSwitch();
  } catch (e) {
    showToast('Refresh failed: ' + e.message);
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
refreshBoard();
setInterval(refreshBoard, 20000);
</script>
